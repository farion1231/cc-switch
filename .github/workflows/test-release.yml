name: Test Release

on:
  push:
    tags:
      - "test-v*"

permissions:
  contents: write

concurrency:
  group: test-release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows x64 test package
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build unsigned Simplified Chinese NSIS package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $config = Join-Path $env:RUNNER_TEMP "tauri-test-release.json"

          @'
          {
            "bundle": {
              "createUpdaterArtifacts": false,
              "windows": {
                "nsis": {
                  "languages": ["SimpChinese"]
                }
              }
            }
          }
          '@ | Set-Content -Path $config -Encoding utf8

          pnpm tauri build --bundles nsis --config $config

      - name: Prepare release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "release-assets" | Out-Null

          $installer = Get-ChildItem `
            -Path "src-tauri/target/release/bundle/nsis" `
            -Filter "*-setup.exe" |
            Select-Object -First 1

          if ($null -eq $installer) {
            throw "NSIS installer not found"
          }

          $assetName = "CC-Switch-${{ github.ref_name }}-Windows-x64-setup.exe"
          $assetPath = Join-Path "release-assets" $assetName
          Copy-Item $installer.FullName $assetPath

          $hash = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $assetName" | Set-Content -Path "$assetPath.sha256" -Encoding ascii

          Write-Host "Prepared $assetName"
          Write-Host "SHA-256: $hash"

      - name: Publish test release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: CC Switch ${{ github.ref_name }} unsigned test build
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          body: |
            Windows x64 unsigned community test build from commit `${{ github.sha }}`.

            This package is intended for testing modified code. Windows may show an unknown publisher or SmartScreen warning.

            Download the `.sha256` file to verify the installer before use.
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
