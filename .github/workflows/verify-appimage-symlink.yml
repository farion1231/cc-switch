name: Verify AppImage .DirIcon Symlink

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  verify-appimage:
    name: Verify AppImage .DirIcon Symlink
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl file patchelf libssl-dev \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Install frontend deps
        run: pnpm install --no-frozen-lockfile

      - name: Build AppImage only
        run: pnpm tauri build --bundles appimage || true

      - name: Locate AppImage
        id: find-appimage
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "❌ AppImage not found"
            exit 1
          fi
          echo "APPIMAGE=$APPIMAGE" >> $GITHUB_OUTPUT
          echo "✅ AppImage: $APPIMAGE"
          ls -lh "$APPIMAGE"

      - name: Verify .DirIcon symlink
        run: |
          set -euo pipefail
          APPIMAGE="${{ steps.find-appimage.outputs.appimage }}"

          echo "=== Extracting AppImage ==="
          ("$APPIMAGE" --appimage-extract) > /dev/null 2>&1 || true

          echo "=== Checking .DirIcon ==="
          if [ -L squashfs-root/.DirIcon ]; then
            TARGET=$(readlink squashfs-root/.DirIcon)
            echo ".DirIcon target: $TARGET"

            # Check if it's an absolute path
            if [[ "$TARGET" == /* ]]; then
              echo "❌ FAILED: .DirIcon uses absolute path: $TARGET"
              echo "Expected a relative path like 'usr/share/icons/hicolor/256x256/apps/..."
              exit 1
            else
              echo "✅ PASSED: .DirIcon uses relative path: $TARGET"
            fi
          else
            echo "⚠️ WARNING: .DirIcon is not a symlink"
            if [ -f squashfs-root/.DirIcon ]; then
              echo ".DirIcon is a regular file"
            else
              echo ".DirIcon does not exist"
            fi
          fi

          echo "=== Checking .desktop file ==="
          DESKTOP_FILE=$(find squashfs-root -name "*.desktop" -type f | head -1 || true)
          if [ -n "$DESKTOP_FILE" ]; then
            echo "Found .desktop file: $DESKTOP_FILE"
            if grep -q "Icon=/" "$DESKTOP_FILE"; then
              echo "❌ FAILED: .desktop file contains absolute Icon path"
              grep "Icon=" "$DESKTOP_FILE"
              exit 1
            else
              echo "✅ PASSED: .desktop file uses relative Icon path"
            fi
          fi

          rm -rf squashfs-root
          echo "=== Verification complete ==="

      - name: Upload AppImage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CC-Switch-verify-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
