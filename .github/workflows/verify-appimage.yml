name: Verify AppImage Fix

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  verify-appimage:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl file patchelf libssl-dev \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build AppImage only
        run: pnpm tauri build --bundles appimage || true

      - name: Locate AppImage
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "❌ AppImage not found"
            exit 1
          fi
          echo "APPIMAGE=$APPIMAGE" >> $GITHUB_ENV
          echo "✅ AppImage: $APPIMAGE"
          ls -lh "$APPIMAGE"

      - name: Show .DirIcon before fix
        run: |
          ("$APPIMAGE" --appimage-extract) > /dev/null 2>&1 || true
          echo "=== Before fix ==="
          ls -la squashfs-root/.DirIcon
          readlink squashfs-root/.DirIcon

      - name: Fix .DirIcon and repack
        run: |
          ARCH=$(uname -m)
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${ARCH}.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          ln -sf CC\ Switch.png squashfs-root/.DirIcon

          echo "=== After fix ==="
          ls -la squashfs-root/.DirIcon
          readlink squashfs-root/.DirIcon

          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool --no-appstream squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool
          echo "✅ AppImage repacked"

      - name: Verify final AppImage
        run: |
          ("$APPIMAGE" --appimage-extract) > /dev/null 2>&1 || true
          echo "=== .DirIcon in final AppImage ==="
          ls -la squashfs-root/.DirIcon
          TARGET=$(readlink squashfs-root/.DirIcon)
          echo "Target: $TARGET"
          case "$TARGET" in
            /*) echo "❌ Still absolute path"; exit 1 ;;
            *)  echo "✅ Relative path: $TARGET" ;;
          esac
          rm -rf squashfs-root

      - name: Upload AppImage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CC-Switch-verify-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
