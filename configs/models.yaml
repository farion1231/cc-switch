# OmniAgent Workbench — Model Configuration
# Place in: configs/models.yaml

models:
  # === 顶级规划/审查模型 ===
  frontier_planner:
    provider: anthropic
    model: claude-opus-4-7
    api_key_env: ANTHROPIC_API_KEY
    roles: [planner, aggregator, final_review]
    use_for: [complex_architecture, risk_assessment, cross_modal_arbitration]
    cost_per_1M_input: 15.0
    cost_per_1M_output: 75.0
    cost_last_updated: "2026-06-01"
    max_calls_per_task: 3

  frontier_multimodal:
    provider: openai
    model: gpt-5.5
    api_key_env: OPENAI_API_KEY
    roles: [multimodal_judge, complex_vision, cross_modal_fallback]
    cost_per_1M_input: 10.0
    cost_per_1M_output: 40.0
    cost_last_updated: "2026-06-01"

  # === 中端执行模型 ===
  mid_executor_code:
    provider: openai
    model: gpt-5.5-mini
    api_key_env: OPENAI_API_KEY
    roles: [code_generation, structured_output, engineering_draft]
    cost_per_1M_input: 0.50
    cost_per_1M_output: 2.00
    cost_last_updated: "2026-06-01"

  mid_executor_text:
    provider: anthropic
    model: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY
    roles: [reasoning, analysis, document_review]
    cost_per_1M_input: 3.0
    cost_per_1M_output: 15.0
    cost_last_updated: "2026-06-01"

  # === 廉价执行模型 ===
  cheap_executor_code:
    provider: deepseek
    model: deepseek-v4-pro
    api_key_env: DEEPSEEK_API_KEY
    roles: [code_generation, structured_output, engineering_draft]
    cost_per_1M_input: 0.27
    cost_per_1M_output: 1.10
    cost_last_updated: "2026-06-01"

  cheap_executor_text:
    provider: glm
    model: glm-5.1
    api_key_env: GLM_API_KEY
    roles: [chinese_writing, summarization, document_generation]
    cost_per_1M_input: 0.50
    cost_per_1M_output: 2.00
    cost_last_updated: "2026-06-01"

  cheap_executor_fast:
    provider: qwen
    model: qwen-turbo
    api_key_env: QWEN_API_KEY
    roles: [quick_answer, translation, formatting]
    cost_per_1M_input: 0.30
    cost_per_1M_output: 0.60
    cost_last_updated: "2026-06-01"

  # === 本地模型 ===
  local_fast_text:
    provider: ollama
    model: qwen3:8b
    endpoint: http://127.0.0.1:11434
    roles: [classification, simple_extraction, formatting]
    cost_per_1M_input: 0
    cost_per_1M_output: 0
    cost_note: "本地运行，仅计算电费+硬件折旧 ≈ $0.002/1M tokens"

  local_code:
    provider: ollama
    model: qwen-coder:14b
    endpoint: http://127.0.0.1:11434
    roles: [simple_code, test_generation, docstring]
    cost_per_1M_input: 0
    cost_per_1M_output: 0

  # === 视觉模型 ===
  vision_expert:
    provider: openai_compatible
    model: qwen-vl-max
    api_key_env: QWEN_API_KEY
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    roles: [image_description, screenshot_analysis, pcb_visual_inspection]
    modalities: [image_input]

  vision_cheap:
    provider: ollama
    model: llava:13b
    endpoint: http://127.0.0.1:11434
    roles: [simple_image_description, quick_screenshot]
    modalities: [image_input]

  # === 语音模型 ===
  speech_stt:
    provider: local
    tool: whisper
    model: large-v3
    roles: [audio_transcription]
    modalities: [audio_input, text_output]

  speech_tts:
    provider: edge_tts
    roles: [text_to_speech]
    modalities: [text_input, audio_output]

  # === 审查模型 ===
  verifier:
    provider: openai
    model: gpt-5.5-mini
    api_key_env: OPENAI_API_KEY
    roles: [quality_check, candidate_ranking, schema_validation]
    cost_per_1M_input: 0.50
    cost_per_1M_output: 2.00
    cost_last_updated: "2026-06-01"

# === 路由规则 ===
routing:
  default_strategy: route

  rules:
    - match:
        task_type: [summary, rewrite, translate]
      strategy: route
      model: cheap_executor_fast

    - match:
        task_type: [image_description]
      strategy: route
      model: vision_expert

    - match:
        task_type: [simple_code]
      strategy: route
      model: cheap_executor_code

    - match:
        task_type: [coding, bug_fix, refactor]
        complexity: medium
      strategy: cascade
      models: [cheap_executor_code, mid_executor_code, frontier_planner]

    - match:
        task_type: [coding]
        complexity: high
        risk: [high, critical]
      strategy: debate
      models: [mid_executor_code, cheap_executor_code, frontier_planner]
      judge: frontier_planner

    - match:
        has_image: true
        has_text: true
        tightly_coupled: false
      strategy: cross_modal
      vision_model: vision_expert
      text_model: mid_executor_text
      fallback_model: frontier_multimodal

    - match:
        complexity: high
        risk: critical
        verifiability: low
      strategy: moa
      proposers: [mid_executor_code, cheap_executor_code, frontier_planner]
      aggregator: frontier_planner

# === 预算 ===
budget:
  daily_limit_usd: 20.0
  warning_threshold_pct: 80
  hard_stop: true

  per_task_limits:
    max_model_calls: 10
    max_cost_usd: 2.0
    max_latency_ms: 120000

# === 升级配置 ===
escalation:
  # Phase 1-2: binary judgment
  use_binary_quality: true
  escalation_triggers:
    - tool_test_failed
    - schema_validation_failed

  # Phase 5: continuous thresholds (disabled until calibrated)
  continuous_thresholds:
    enabled: false
    confidence_threshold: 0.65  # Requires >= 1000 labeled data points
