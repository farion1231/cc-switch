# OmniAgent Workbench — Orchestration Strategies
# Edit this file to customize strategy behavior. Changes are hot-reloaded.
#
# Note: Model keys must match the keys defined in the models section (or Rust defaults).
# Default model keys: cheap_coder (deepseek), frontier (anthropic)
# Debate and MoA strategies use type: cascade since no dedicated debate action exists yet.

enabled: false  # Set to true to enable orchestration

strategies:
  route:
    description: "Direct route to best model, no verification"
    when:
      complexity: [0, 0.4]
      risk: ["low"]
    action:
      type: route
      use_model: cheap_coder
      verify: false

  cascade:
    description: "Cheap first → quality check → escalate"
    when:
      complexity: [0.4, 0.7]
      risk: ["medium", "high"]
    action:
      type: cascade
      models:
        - cheap_coder
        - frontier
      verify_each: true
      escalate_on_fail: true
      quality_threshold: 0.65

  debate:
    description: "Multi-model debate with independent judge (uses cascade)"
    when:
      complexity: [0.7, 1.0]
      risk: ["high", "critical"]
    action:
      type: cascade
      models:
        - cheap_coder
        - frontier
      verify_each: true
      escalate_on_fail: true
      quality_threshold: 0.75

  moa:
    description: "Mixture of Agents — multiple proposers + aggregator (uses cascade)"
    when:
      complexity: [0.8, 1.0]
      risk: ["critical"]
      task_type: ["coding", "architecture"]
    action:
      type: cascade
      models:
        - cheap_coder
        - frontier
      verify_each: true
      escalate_on_fail: true
      quality_threshold: 0.80
